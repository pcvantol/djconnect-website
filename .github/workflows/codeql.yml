name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: "24 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@b02217ab54ff5a93e9ba5ae406ac608f43ff8792
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-website

  analyze:
    uses: pcvantol/djconnect/.github/workflows/djconnect-codeql-ci.yml@b02217ab54ff5a93e9ba5ae406ac608f43ff8792
    with:
      languages: javascript-typescript
