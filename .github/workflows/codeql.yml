name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: "24 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@a73237f907554b2fba16e0e168d5fde22ce75455
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-website

  analyze:
    uses: pcvantol/djconnect/.github/workflows/djconnect-codeql-ci.yml@a73237f907554b2fba16e0e168d5fde22ce75455 # Repaired reachable workflow closure
    with:
      languages: javascript-typescript
