name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: "24 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@c34b9ba83de6d341ff223f5b2225624ccdab17c9
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-website

  analyze:
    uses: pcvantol/djconnect/.github/workflows/djconnect-codeql-ci.yml@c34b9ba83de6d341ff223f5b2225624ccdab17c9 # Repaired reachable workflow closure
    with:
      languages: javascript-typescript
