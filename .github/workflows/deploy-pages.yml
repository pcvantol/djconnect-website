name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test website
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check third-party packages and tools
        run: npm run deps:check

      - name: Run automated tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate all localized page screenshots
        run: npm run screenshots:all

      - name: Run browser smoke tests
        env:
          SMOKE_BASE_URL: https://djconnect.dev
        run: npm run test:smoke

      - name: Build release site
        run: npm run build:release

      - name: Upload Cloudflare Pages artifact
        uses: actions/upload-artifact@v5
        with:
          name: cloudflare-pages-site
          path: dist/wwwroot
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy website
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Download Cloudflare Pages artifact
        uses: actions/download-artifact@v5
        with:
          name: cloudflare-pages-site
          path: dist/wwwroot

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist/wwwroot --project-name djconnect --branch main

      - name: Check production deployment
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          curl --fail --silent --show-error --location https://djconnect.dev > /tmp/djconnect-home.html
          grep -q "DJConnect website v${version}" /tmp/djconnect-home.html

  cleanup-workflow-runs:
    name: Cleanup workflow runs
    runs-on: ubuntu-latest
    needs:
      - test
      - deploy
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      ) &&
      needs.test.result == 'success' &&
      (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      KEEP_RUNS: 2
    steps:
      - name: Delete older completed workflow runs
        run: |
          set -euo pipefail

          current_workflow_id="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq '.workflow_id')"
          workflows="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows" --paginate --jq '.workflows[] | .id')"

          for workflow_id in $workflows; do
            keep_limit="$KEEP_RUNS"
            if [[ "$workflow_id" == "$current_workflow_id" ]]; then
              keep_limit=$((KEEP_RUNS - 1))
            fi

            mapfile -t run_ids < <(
              gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_id}/runs?status=completed&per_page=100" \
                --jq '.workflow_runs | sort_by(.created_at) | reverse | .[].id'
            )

            if ((${#run_ids[@]} <= keep_limit)); then
              continue
            fi

            for index in "${!run_ids[@]}"; do
              run_id="${run_ids[$index]}"
              if ((index < keep_limit)) || [[ "$run_id" == "$GITHUB_RUN_ID" ]]; then
                continue
              fi
              gh api --method DELETE "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
            done
          done
