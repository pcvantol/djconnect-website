name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test website
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check third-party packages and tools
        run: npm run deps:check

      - name: Run automated tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate all localized page screenshots
        run: npm run screenshots:all

      - name: Run browser smoke tests
        env:
          SMOKE_BASE_URL: https://djconnect.dev
        run: npm run test:smoke

      - name: Build release site
        run: npm run build:release

      - name: Upload Cloudflare Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages-site
          path: dist/wwwroot
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy website
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Cloudflare Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-pages-site
          path: dist/wwwroot

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist/wwwroot --project-name djconnect --branch main

      - name: Check production deployment
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          curl --fail --silent --show-error --location https://djconnect.dev > /tmp/djconnect-home.html
          grep -q "DJConnect website v${version}" /tmp/djconnect-home.html
