name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test website
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check third-party packages and tools
        run: npm run deps:check

      - name: Run automated tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate all localized page screenshots
        run: npm run screenshots:all

      - name: Run browser smoke tests
        env:
          SMOKE_BASE_URL: https://djconnect.dev
        run: npm run test:smoke

      - name: Build release site
        run: npm run build:release

  deploy:
    name: Deploy website
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release site
        run: npm run build:release

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: efe77cadf8317a53832fca0848e3ae51
        run: npx wrangler@4 pages deploy dist/wwwroot --project-name djconnect --branch main
