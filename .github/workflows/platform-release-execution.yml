name: Platform release execution contract

on:
  workflow_dispatch:
    inputs:
      action:
        required: true
        type: choice
        options: [build, artifact_publication, deployment, post_release, rollback]
      candidate_sha:
        required: true
        type: string
      execution_mode:
        required: true
        type: choice
        options: [dry_run, execute]
      manifest_id:
        required: true
        type: string
      platform_version:
        required: true
        type: string
      release_profile:
        required: true
        type: choice
        options: [INTERNAL_RELEASE]

permissions:
  contents: read

jobs:
  validate-and-evidence:
    name: Validate qualified release dispatch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 1
      - name: Validate bounded request and candidate
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          EXECUTION_MODE: ${{ inputs.execution_mode }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
        run: |
          test "$RELEASE_PROFILE" = INTERNAL_RELEASE
          # Execution-mode mutations remain disabled until this repository's
          # platform-native build and deployment action is qualified.
          test "$EXECUTION_MODE" = dry_run
          printf '%s' "$CANDIDATE_SHA" | grep -Eq '^[0-9a-f]{40}$'
          printf '%s' "$PLATFORM_VERSION" | grep -Eq '^[0-9]+\.[0-9]+$'
          printf '%s' "$MANIFEST_ID" | grep -Eq '^release-sim-[0-9a-f]+$'
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
      - name: Produce canonical execution evidence
        env:
          ACTION: ${{ inputs.action }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
        run: |
          python - <<'PY'
          from datetime import UTC, datetime
          import json, os
          with open("platform-release-execution-evidence.json", "w", encoding="utf-8") as file:
              json.dump({"workflow": "platform-release-execution.yml", "workflow_run_id": os.environ["GITHUB_RUN_ID"], "repository": os.environ["GITHUB_REPOSITORY"], "candidate_sha": os.environ["CANDIDATE_SHA"], "platform_version": os.environ["PLATFORM_VERSION"], "action": os.environ["ACTION"], "artifact_hashes": {}, "deployment_result": "NOT_EXECUTED", "rollback": "PREPARED", "timestamp": datetime.now(UTC).replace(microsecond=0).isoformat().replace("+00:00", "Z"), "status": "PASS"}, file, sort_keys=True)
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: platform-release-execution-evidence
          path: platform-release-execution-evidence.json
          if-no-files-found: error
