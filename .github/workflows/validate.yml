name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  website:
    name: Website quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check third-party packages and tools
        run: npm run deps:check

      - name: Run regression and content checks
        run: npm test

      - name: Build release site
        run: npm run build:release

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate all localized page screenshots
        run: npm run screenshots:all

      - name: Run local browser smoke tests
        env:
          SMOKE_BASE_URL: http://127.0.0.1:4173
        run: |
          node <<'NODE' &
          const http = require("node:http");
          const fs = require("node:fs");
          const path = require("node:path");

          const root = path.join(process.cwd(), "dist", "wwwroot");
          const types = {
            ".css": "text/css; charset=utf-8",
            ".html": "text/html; charset=utf-8",
            ".js": "text/javascript; charset=utf-8",
            ".json": "application/json; charset=utf-8",
            ".png": "image/png",
            ".svg": "image/svg+xml",
            ".txt": "text/plain; charset=utf-8",
            ".xml": "application/xml; charset=utf-8"
          };

          const server = http.createServer((req, res) => {
            const url = new URL(req.url, "http://127.0.0.1:4173");
            let pathname = decodeURIComponent(url.pathname);
            if (pathname === "/") pathname = "/index.html";
            let filePath = path.join(root, pathname);
            if (!path.extname(filePath) && fs.existsSync(`${filePath}.html`)) {
              filePath = `${filePath}.html`;
            }
            if (!filePath.startsWith(root) || !fs.existsSync(filePath) || fs.statSync(filePath).isDirectory()) {
              res.writeHead(404, { "content-type": "text/plain; charset=utf-8" });
              res.end("not found");
              return;
            }
            res.writeHead(200, { "content-type": types[path.extname(filePath)] || "application/octet-stream" });
            fs.createReadStream(filePath).pipe(res);
          });

          server.listen(4173, "127.0.0.1", () => console.log("Serving dist/wwwroot on http://127.0.0.1:4173"));
          NODE
          for attempt in {1..30}; do
            if curl --fail --silent --output /dev/null http://127.0.0.1:4173; then
              break
            fi
            sleep 1
          done
          curl --fail --silent --output /dev/null http://127.0.0.1:4173
          npm run test:smoke
