name: Website post-deployment smoke

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        required: true
        type: string
      manifest_id:
        required: true
        type: string
      artifact_id:
        required: true
        type: string
      artifact_sha256:
        required: true
        type: string
      target:
        required: true
        type: choice
        options: [cloudflare_pages_production]
      platform_version:
        required: true
        type: string
      release_profile:
        required: true
        type: choice
        options: [INTERNAL_RELEASE]
      deployment_workflow_run:
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Validate bounded smoke request
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          TARGET: ${{ inputs.target }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
          DEPLOYMENT_WORKFLOW_RUN: ${{ inputs.deployment_workflow_run }}
        run: |
          set -euo pipefail
          printf '%s' "$CANDIDATE_SHA" | grep -Eq '^[0-9a-f]{40}$'
          printf '%s' "$MANIFEST_ID" | grep -Eq '^release-[A-Za-z0-9._-]+$'
          printf '%s' "$ARTIFACT_ID" | grep -Eq '^[0-9]+$'
          printf '%s' "$ARTIFACT_SHA256" | grep -Eq '^[0-9a-f]{64}$'
          test "$TARGET" = cloudflare_pages_production
          printf '%s' "$PLATFORM_VERSION" | grep -Eq '^[0-9]+\.[0-9]+$'
          test "$RELEASE_PROFILE" = INTERNAL_RELEASE
          printf '%s' "$DEPLOYMENT_WORKFLOW_RUN" | grep -Eq '^[0-9]+$'
      - name: Download deployment evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: platform-release-deployment-evidence
          github-token: ${{ github.token }}
          run-id: ${{ inputs.deployment_workflow_run }}
          path: deployment-evidence
      - name: Verify deployment evidence identity
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          evidence=deployment-evidence/platform-release-deployment-evidence.json
          test "$(jq -r '.candidate_sha' "$evidence")" = "$CANDIDATE_SHA"
          test "$(jq -r '.manifest_id' "$evidence")" = "$MANIFEST_ID"
          test "$(jq -r '.artifact_id' "$evidence")" = "$ARTIFACT_ID"
          test "$(jq -r '.artifact_sha256' "$evidence")" = "$ARTIFACT_SHA256"
          test "$(jq -r '.target' "$evidence")" = "$TARGET"
          test "$(jq -r '.deployment_result' "$evidence")" = DEPLOYED_PENDING_SMOKE
      - name: Run read-only production smoke
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location https://djconnect.dev > /tmp/djconnect-home.html
          grep -q 'DJConnect website v' /tmp/djconnect-home.html
      - name: Publish smoke evidence
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          TARGET: ${{ inputs.target }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
          DEPLOYMENT_WORKFLOW_RUN: ${{ inputs.deployment_workflow_run }}
        run: |
          python - <<'PY'
          from datetime import UTC, datetime
          import json, os
          with open("platform-release-smoke-evidence.json", "w", encoding="utf-8") as file:
              json.dump({
                  "schema_version": 1,
                  "kind": "post_deployment_smoke",
                  "repository": os.environ["GITHUB_REPOSITORY"],
                  "candidate_sha": os.environ["CANDIDATE_SHA"],
                  "manifest_id": os.environ["MANIFEST_ID"],
                  "artifact_id": os.environ["ARTIFACT_ID"],
                  "artifact_sha256": os.environ["ARTIFACT_SHA256"],
                  "target": os.environ["TARGET"],
                  "platform_version": os.environ["PLATFORM_VERSION"],
                  "release_profile": os.environ["RELEASE_PROFILE"],
                  "deployment_workflow_run": os.environ["DEPLOYMENT_WORKFLOW_RUN"],
                  "smoke_result": "SMOKE_PASS",
                  "timestamp": datetime.now(UTC).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              }, file, sort_keys=True)
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: platform-release-smoke-evidence
          path: platform-release-smoke-evidence.json
          if-no-files-found: error
