<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">DJConnect landscape device illustration based on LilyGO T-Embed form factor</title>
  <desc id="desc">A stylized landscape DJConnect remote with display on the left and encoder controls on the right.</desc>
  <defs>
    <radialGradient id="glow" cx="52%" cy="48%" r="62%">
      <stop offset="0%" stop-color="#1ed760" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#38bdf8" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="10%" x2="94%" y1="8%" y2="92%">
      <stop offset="0%" stop-color="#2c3546"/>
      <stop offset="46%" stop-color="#14183a"/>
      <stop offset="100%" stop-color="#030407"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#182233"/>
      <stop offset="62%" stop-color="#070b12"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="djAccent" x1="126" y1="190" x2="266" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38d7d2"/>
      <stop offset="48%" stop-color="#7b5cff"/>
      <stop offset="100%" stop-color="#db5cff"/>
    </linearGradient>
    <linearGradient id="djMetal" x1="210" y1="190" x2="270" y2="275" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f2f7ff"/>
      <stop offset="28%" stop-color="#aebdde"/>
      <stop offset="58%" stop-color="#343b54"/>
      <stop offset="100%" stop-color="#e4ecff"/>
    </linearGradient>
    <radialGradient id="djVinyl" cx="42%" cy="32%" r="76%">
      <stop offset="0%" stop-color="#343047"/>
      <stop offset="48%" stop-color="#13111d"/>
      <stop offset="100%" stop-color="#030207"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="34" stdDeviation="32" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="greenGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#1ed760" flood-opacity="0.68"/>
    </filter>
    <filter id="purpleGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#c084fc" flood-opacity="0.78"/>
    </filter>
    <filter id="iconGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#7b5cff" flood-opacity="0.62"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#38d7d2" flood-opacity="0.24"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="96" y="154" width="484" height="252" rx="34"/>
    </clipPath>
    <clipPath id="djIconClip">
      <rect x="130" y="196" width="124" height="124" rx="24"/>
    </clipPath>
  </defs>
  <rect width="980" height="560" fill="url(#glow)"/>
  <g filter="url(#shadow)">
    <rect x="40" y="92" width="900" height="376" rx="132" fill="url(#body)" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
    <rect x="96" y="154" width="484" height="252" rx="34" fill="url(#screen)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>

    <circle cx="748" cy="280" r="106" fill="#0a0d13" stroke="rgba(255,255,255,0.16)" stroke-width="4"/>
    <g fill="#c084fc" stroke="#f0abfc" stroke-width="2" filter="url(#purpleGlow)">
      <circle cx="748" cy="146" r="9"/>
      <circle cx="843" cy="185" r="9"/>
      <circle cx="882" cy="280" r="9"/>
      <circle cx="843" cy="375" r="9"/>
      <circle cx="748" cy="414" r="9"/>
      <circle cx="653" cy="375" r="9"/>
      <circle cx="614" cy="280" r="9"/>
      <circle cx="653" cy="185" r="9"/>
    </g>
    <circle cx="748" cy="280" r="78" fill="#05060a" stroke="#090b11" stroke-width="10"/>
    <circle cx="748" cy="280" r="58" fill="#020308" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
    <g fill="#000" stroke="rgba(255,255,255,0.10)" stroke-width="1">
      <circle cx="748" cy="204" r="4"/>
      <circle cx="786" cy="214" r="4"/>
      <circle cx="814" cy="242" r="4"/>
      <circle cx="824" cy="280" r="4"/>
      <circle cx="814" cy="318" r="4"/>
      <circle cx="786" cy="346" r="4"/>
      <circle cx="748" cy="356" r="4"/>
      <circle cx="710" cy="346" r="4"/>
      <circle cx="682" cy="318" r="4"/>
      <circle cx="672" cy="280" r="4"/>
      <circle cx="682" cy="242" r="4"/>
      <circle cx="710" cy="214" r="4"/>
    </g>
    <circle cx="748" cy="280" r="30" fill="#0d111b" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
    <path d="M748 224v22" stroke="#c084fc" stroke-width="7" stroke-linecap="round" filter="url(#purpleGlow)"/>
    <polygon points="738,261 738,299 770,280" fill="#1ed760" filter="url(#greenGlow)"/>
  </g>
</svg>
